<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Practice</title>
    <style>
        .cart{
            background-color: yellow;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
        }
        .req{
            background-color: rgb(248, 248, 248);
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .req1{
            background-color: rgb(248, 248, 248);
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .req2{
            background-color: rgb(248, 248, 248);
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .req3{
            background-color: rgb(248, 248, 248);
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .req4{
            background-color: rgb(248, 248, 248);
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .req5{
            background-color: rgb(248, 248, 248);
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .req6{
            background-color: rgb(248, 248, 248);
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .req7{
            background-color: rgb(248, 248, 248);
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .active{
            background-color: black;
            color: white;
        }
        .toggled{
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <button class="cart">Add to Cart</button>
    <br><br>
    <button class="req" onclick="enter()">Request Now</button>
    <button class="req1" onclick="enter1()">Schedule for Later</button>
    <br><br>
    <button class="req2" onclick="onoff()">Gaming</button>
    <button class="req3" onclick="onoff1()">Music</button>
    <button class="req4" onclick="onoff2()">Tech</button>
    <br><br>
    <button class="req5" onclick="single()">Gaming</button>
    <button class="req6" onclick="single1()">Music</button>
    <button class="req7" onclick="single2()">Tech</button>
    <br><br>
    <input class="js-input" type="number" name="number" placeholder="Cost">
    <button onclick="cals()">Calculate</button> <br>
    <p class="display" style="color: red;"></p>
    <script>
        let color = document.querySelector('.req');
        let color1 = document.querySelector('.req1');
        function enter(){
            if (event.type === 'click'){
                color.classList.add('active');
                color1.classList.remove('active');
            }
            else if (event.type === 'click'){
                color1.classList.add('active');
                color.classList.remove('active');
            }
        }
        function enter1(){
            if (event.type === 'click'){
                color1.classList.add('active');
                color.classList.remove('active');
            }
        }
        
        let btn = document.querySelector('.req2');
        let btn1 = document.querySelector('.req3');
        let btn2 = document.querySelector('.req4');
        function onoff() {
            if (btn.classList.contains('active')){
                btn.classList.remove('active');
            }
            else{
                btn.classList.add('active');
            }
        }
        function onoff1() {
            if (btn1.classList.contains('active')){
                btn1.classList.remove('active');
            }
            else{
                btn1.classList.add('active');
            }
        }
        function onoff2() {
            if (btn2.classList.contains('active')){
                btn2.classList.remove('active');
            }
            else{
                btn2.classList.add('active');
            }
        }
        let one = document.querySelector('.req5');
        let one1 = document.querySelector('.req6');
        let one2 = document.querySelector('.req7');
        function single(){
            if(event.type === 'click'){
                one.classList.add('active');
                one1.classList.remove('active');
                one2.classList.remove('active');
            }
        }
        function single1(){
            if(event.type === 'click'){
                one.classList.remove('active');
                one1.classList.add('active');
                one2.classList.remove('active');
            }
        }
        function single2(){
            if(event.type === 'click'){
                one.classList.remove('active');
                one1.classList.remove('active');
                one2.classList.add('active');
            }
        }

        let box = document.querySelector('.js-input');
        function cals(){
            let value = Number(box.value);
            if (value >= 0){
                document.querySelector('.display').innerHTML = `Total = ${(value)+10}`;
            }
            else{
                document.querySelector('.display').innerHTML = "Cannot calculate Negative Values!";
            }
        }
    </script>
</body>
</html>
