<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            background-color: black;
            align-items: center;
            text-align: center;
        }
        button{
            height: 200px;
            width: 200px;
            border-radius: 50%;
            border: px solid white;
            margin: 40px;
        }
        button:hover{
            border-color: orangered;
        }
        img{
            width: 50px;
            height: 50px;
        }
        .one img{
            width: 50px;
            height: 50px;
            background-color: white;
            border-radius: 50%;
        }
        .js-one{
            color: white;
            font-size: 40px;
        }
        .js-two{
            color: white;
            font-size: 40px;
        }
        .js-three{
            color: white;
            font-size: 40px;
        }
    </style>
</head>
<body>
    <h2>Rock Paper Scissors</h2>

    <button onclick="
    playGame('Rock');
    "><img src="rock-emoji.png" alt="">
    </button>
    

    <button onclick="
    playGame('Paper');
    "><img src="paper-emoji.png" alt="">
    </button>

    <button onclick="
    playGame('Scissor');
    "><img src="scissor-emoji.png" alt="">
    </button>

    <button onclick="
    Reset();
    console.log('Reseted!');
    " class="one"><img src="reset.png" alt=""></button>

    <p class="js-one"></p>

    <p class="js-two"></p>

    <p class="js-three"></p>

    <script>
    let Score = JSON.parse(localStorage.getItem('Score'))
    // console.log(Score);
    if (Score === null){
        Score = {
            Win: 0,
            Lost: 0,
            Tie: 0
        }; 
    }
        
        function playGame(PlayerMove){
            let result = '';
            const computerMove = compMove();
            if (PlayerMove === 'Rock'){
                if (computerMove === 'Rock') {
                    result = 'Tie';
                }
                else if (computerMove === 'Paper') {
                    result = 'You Lost';
                }
                else {
                    result = 'You Win';
                }
                document.querySelector('.js-one').innerHTML = result;
            }

            else if (PlayerMove === 'Paper') {
                if (computerMove === 'Paper') {
                    result = 'Tie';
                }
                else if (computerMove === 'Rock') {
                    result = 'You Win';
                }
                else {
                    result = 'You Lost';
                }
                document.querySelector('.js-one').innerHTML = result;
            }

            else if(PlayerMove === 'Scissor') {
                if (computerMove === 'Scissor') {
                    result = 'Tie';
                }
                else if (computerMove === 'Rock') {
                    result = 'You Lost';
                }
                else if (computerMove === 'Paper'){
                    result = 'You Win';
                }
                document.querySelector('.js-one').innerHTML = result;
            }


            if (result === 'You Win'){
                Score.Win = Score.Win + 1;
            }
            else if (result === 'You Lost') {
                Score.Lost = Score.Lost + 1;
            }
            else {
                Score.Tie = Score.Tie + 1;
            }
            console.log(Score);

            localStorage.setItem('Score', JSON.stringify(Score));

            document.querySelector('.js-two').innerHTML = `You <img src="${PlayerMove}-emoji.png"> - <img src="${computerMove}-emoji.png"> Computer`;
            document.querySelector('.js-three').innerHTML = `Wins: ${Score.Win}, Losts: ${Score.Lost}, Ties: ${Score.Tie}`;
            // alert(`You Picked ${PlayerMove}. Computer Picked ${computerMove}.${result} \nWin = ${Score.Win} \nLost = ${Score.Lost} \nTie = ${Score.Tie}`);
        }
    
        function Reset(){
            Score.Win = 0,
            Score.Lost = 0,
            Score.Tie = 0
            localStorage.removeItem('Score');
            alert(`Win = ${Score.Win} \nLost = ${Score.Lost} \nTie = ${Score.Tie}`);
            document.querySelector('.js-one').innerHTML = '';
            document.querySelector('.js-two').innerHTML = `Game Reseted!`;
            document.querySelector('.js-three').innerHTML = `Win: ${Score.Win}, Lost: ${Score.Lost}, Tie: ${Score.Tie}`;
            //console.log(`Win = ${Score.Win} \nLost = ${Score.Lost} \nTie = ${Score.Tie}`);
        };

        // let computerMove = ''; 
        function compMove(){
            const random = Math.random();

            if (random >= 0 && random < 1/3){
                computerMove = 'Rock';
            }
            else if (random >= 1/3 && random < 2/3){
                computerMove = 'Paper';
            }
            else {
                computerMove = 'Scissor';
            }
            return computerMove;
        }
    
    </script>
</body>
</html>
