<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Toss</title>
</head>
<body>
    <button onclick="
    Guess();
    Player('Heads');
    ">Heads</button>

    <button onclick="
    Guess();
    Player('Tails');
    ">Tails</button>

    <button onclick="
    Reset();
    console.log('Reseted!')
    ">Reset Score</button>

    <script>
        function Reset() {
            result = {
               Win: 0,
               Lost: 0 
            };
            localStorage.setItem('result',JSON.stringify(result));
            console.log(result);
        };
        let result = JSON.parse(localStorage.getItem('result')) || {
            Win: 0,
            Lost: 0
        };

        let computerMove = '';
        function Guess(){
            let random = Math.random();
            if (random <= 0.5 ){
                computerMove = 'Heads';
            }
            else if (random > 0.5){
                computerMove = 'Tails';
            }
        }

        
        function Player(PlayerMove) {
            if (PlayerMove === 'Heads'){
                if (computerMove === 'Heads'){
                    result.Win++;
                    localStorage.setItem('result',JSON.stringify(result));
                    console.log(result);
                }
                else if (computerMove === 'Tails') {
                    result.Lost++;
                    localStorage.setItem('result',JSON.stringify(result));
                    console.log(result);
                }
            }

            if (PlayerMove === 'Tails'){
                if (computerMove === 'Tails'){
                    result.Win++;
                    localStorage.setItem('result',JSON.stringify(result));
                    console.log(result);
                }
                else if (computerMove === 'Heads') {
                    result.Lost++;
                    localStorage.setItem('result',JSON.stringify(result));
                    console.log(result);
                }
            }
        }

    </script>
</body>
</html>
