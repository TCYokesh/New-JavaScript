<button class="remove" data-id="2">Remove Laptop</button>

<body>
<script>
    const numbers = [1, 2, 3, 4];

    numbers.forEach((num) => {

    const cart = [
        { name: "Phone", quantity: 2 },
        { name: "Laptop", quantity: 1 }

    let quantity = 0;

        quantity += carItem.quantity;

    console.log(quantity);

        console.log('Found');

    let i = 1;

function renderCart() {
    let html = '';

    kart.forEach((item) => {
        html += `
            <div>
                ${item.name} - ${item.quantity}
            </div>
        `;
    });

    document.querySelector('.cart-container').innerHTML = html;
}

let kart = [];
let k = document.querySelectorAll('.add');
k.forEach((kr) => {
    kr.addEventListener('click', () => {
        let matchingItem;
        kart.forEach((Item) => {
            if(Item.productId === kr.dataset.id){
                matchingItem = Item;
            }
        });
        if (matchingItem){
            matchingItem.quantity += 1;
        }
        else{
            kart.push({
                productId : kr.dataset.id,
                name: kr.dataset.name,
                quantity: 1
            })
        }
        console.log(kart);
    })
});

let m = document.querySelectorAll('.remove');
m.forEach((kre) => {
    kre.addEventListener('click',() => {
        let matchingitem;
        kart.forEach((item) =>{
            if (item.productId === kre.dataset.id){
                matchingitem = item;
            } 
        })
        if (matchingitem.quantity > 1){
            matchingitem.quantity -= 1
        }
        else if(matchingitem.quantity === 1){
            let newKart = [];
            kart.forEach((item) => {
                if(item.productId !== kre.dataset.id){
                    newKart.push(item);
                }
            })
            kart = newKart;
        }
        console.log(kart);
    })
});


</script>
</body>
